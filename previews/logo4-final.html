<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>logo4 final — E</title>
<style>
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:#14161a;color:#e8eaed;padding:36px}
  h1{font-weight:600;margin:0 0 20px}
  .row{display:flex;gap:24px;flex-wrap:wrap;align-items:center}
  .box{border-radius:16px;padding:26px;display:flex;align-items:center;justify-content:center}
  .dk{background:#14161a;border:1px solid #2a2e35}.lt{background:#eef1f5}
  .box img{display:block}
  .big img{width:300px}.mid img{width:180px}.sm img{width:110px}
  small{color:#9aa0a6;display:block;margin-top:8px;font-size:12px}
</style></head><body>
<h1>logo4 · E — gradient TED / gray CARDS / charcoal rule</h1>
<div class="row">
  <div><div class="box dk big"><img src="../images/logo4/logo.svg"></div><small>dark · 300w</small></div>
  <div><div class="box lt big"><img src="../images/logo4/logo.svg"></div><small>light · 300w</small></div>
</div>
<div class="row" style="margin-top:24px">
  <div><div class="box dk mid"><img src="../images/logo4/logo.svg"></div><small>dark · 180w</small></div>
  <div><div class="box lt mid"><img src="../images/logo4/logo.svg"></div><small>light · 180w</small></div>
  <div><div class="box dk sm"><img src="../images/logo4/logo.svg"></div><small>dark · 110w</small></div>
  <div><div class="box lt sm"><img src="../images/logo4/logo.svg"></div><small>light · 110w</small></div>
</div>
</body></html>
