<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Halftone Crop Sweep S=9</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:#14161a;color:#e8eaed;padding:36px}
  h1{font-weight:600;margin:0 0 4px}.sub{color:#9aa0a6;margin:0 0 24px;font-size:14px}
  .row{display:flex;gap:26px;flex-wrap:wrap}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .pair{display:flex;gap:12px;align-items:flex-end}
  .cell img{width:168px;height:168px}.cell .sm{width:52px;height:52px}
  .lbl{font-size:12px;color:#c9ced4}
</style></head><body>
<h1>Halftone crop sweep — dot size S = 9</h1>
<p class="sub">From tighter (70%) to fuller (94%). Big + 48px each. Pick a crop %.</p>
<div class="row">
  <div class="cell"><div class="pair"><img src="../images/_logo-work/variants/halftone_crop70_s9.png"><img class="sm" src="../images/_logo-work/variants/halftone_crop70_s9.png"></div><span class="lbl">70% (tighter)</span></div>
  <div class="cell"><div class="pair"><img src="../images/_logo-work/variants/halftone_crop78_s9.png"><img class="sm" src="../images/_logo-work/variants/halftone_crop78_s9.png"></div><span class="lbl">78%</span></div>
  <div class="cell"><div class="pair"><img src="../images/_logo-work/variants/halftone_crop86_s9.png"><img class="sm" src="../images/_logo-work/variants/halftone_crop86_s9.png"></div><span class="lbl">86%</span></div>
  <div class="cell"><div class="pair"><img src="../images/_logo-work/variants/halftone_crop94_s9.png"><img class="sm" src="../images/_logo-work/variants/halftone_crop94_s9.png"></div><span class="lbl">94% (fuller)</span></div>
</div>
</body></html>
